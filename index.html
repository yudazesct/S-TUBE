<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-Tube Es Batu Kristal</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary-blue: #0076BE; --light-blue: #E3F2FD; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background-color: #f0f8ff; color: #333; text-align: center; }
        header { background: linear-gradient(135deg, var(--primary-blue), #00AEEF); color: white; padding: 30px 20px; border-bottom-left-radius: 30px; border-bottom-right-radius: 30px; }
        .logo-img { width: 100px; height: 100px; background: white; border-radius: 50%; margin-bottom: 10px; border: 3px solid white; }
        .order-container { padding: 25px; background: white; margin: -20px 20px 20px; border-radius: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn-order { background-color: #25D366; color: white; border: none; padding: 18px; width: 100%; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .area-tag { display: inline-block; background: var(--light-blue); padding: 5px 12px; border-radius: 20px; margin: 4px; color: var(--primary-blue); font-size: 12px; font-weight: bold; }
        #status-gps { font-size: 12px; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

<header>
    <img src="logo.jpg" alt="S-Tube Logo" class="logo.png">
    <h1>S-TUBE</h1>
    <p>Pemesanan Es Batu Kristal</p>
</header>

<div class="order-container">
    <p style="font-weight: bold; color: var(--primary-blue);">Isi Data Pesanan</p>
    <input type="text" id="nama" placeholder="Nama Lengkap">
    <input type="number" id="jumlah" placeholder="Jumlah Pesanan (Kantong)">
    
    <button class="btn-order" onclick="prosesOrder()">
        🛒 Pesan Sekarang (Kirim Lokasi)
    </button>
    <div id="status-gps">Klik tombol untuk kirim pesanan & lokasi GPS otomatis</div>
</div>

<div style="padding: 20px;">
    <p style="font-size: 14px; margin-bottom: 5px;">📍 Area Layanan:</p>
    <span class="area-tag">Surabaya</span>
    <span class="area-tag">Sidoarjo</span>
    <span class="area-tag">Mojokerto</span>
    <span class="area-tag">Pasuruan</span>
</div>

<script>
    function prosesOrder() {
        const nama = document.getElementById('nama').value;
        const jumlah = document.getElementById('jumlah').value;
        const statusGps = document.getElementById('status-gps');

        if (!nama || !jumlah) {
            alert("Harap isi Nama dan Jumlah Pesanan");
            return;
        }

        statusGps.innerHTML = "⏳ Sedang mengambil lokasi...";

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    const googleMapsUrl = `https://www.google.com/maps?q=${lat},${lon}`;
                    kirimKeWA(nama, jumlah, googleMapsUrl);
                },
                (error) => {
                    alert("Gagal mengambil lokasi. Pastikan GPS HP Aktif. Pesanan tetap dikirim tanpa lokasi.");
                    kirimKeWA(nama, jumlah, "Lokasi tidak diberikan (GPS Nonaktif)");
                }
            );
        } else {
            alert("Browser HP Anda tidak mendukung deteksi lokasi.");
            kirimKeWA(nama, jumlah, "Lokasi tidak didukung perangkat");
        }
    }

    function kirimKeWA(nama, jumlah, lokasi) {
        const phone = "6282338804070";
        const pesan = `Halo S-Tube, saya mau order es kristal:%0A%0A` +
                      `👤 Nama: ${nama}%0A` +
                      `📦 Jumlah: ${jumlah} Kantong%0A` +
                      `📍 Lokasi: ${lokasi}`;
        
        window.open(`https://api.whatsapp.com/send?phone=${phone}&text=${pesan}`, '_blank');
        document.getElementById('status-gps').innerHTML = "Klik tombol untuk kirim pesanan & lokasi GPS otomatis";
    }
</script>

</body>
</html>
